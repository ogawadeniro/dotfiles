# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

$font = Bizin Gothic NF

general {
    hide_cursor = false
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = /home/rogawa/.dotfiles/hypr/bg_images/ramu_chan.png
    blur_passes = 2 
    blur_size = 7
    brightness = 0.5 
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 0
    inner_color = rgba(0, 0, 0, 0.2) # no fill

    check_color = rgba(204, 51, 255, 0.8) rgba(204, 51, 255, 0.6) 45deg
    fail_color = rgba(255, 102, 51, 0.5)

    font_color = rgba(240, 240, 240, 0.5)
    fade_on_empty = false
    rounding = -1

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL$FPRINTFAIL

    # uncomment if you wish to display a message during authentication
    check_text = Authenticating...

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    position = 0, -70
    halign = center
    valign = center
}

image {
    monitor =
    path = /home/rogawa/archive/deniro.jpg
    size = 150                     # 画像サイズ
    rounding = -1                  # マイナス値で円形（丸画像）になります
    border_size = 0                # 枠線の太さ
    border_color = rgba(221, 221, 221, 1.0) # 枠線の色
    rotate = 0                     # 回転角度
    reload_time = -1               # 定期更新が必要な場合は秒数を指定

    position = 0, 80              # 表示位置
    halign = center                # 水平方向の配置
    valign = center                # 垂直方向の配置
}

# 時刻
label {
    monitor =
    text = $TIME
    color = rgba(240, 240, 240, 0.8)
    font_size = 64
    font_family = $font
    position = 0, 230
    halign = center
    valign = center
}

# 日付
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%Y/%m/%d(%a)")"
    color = rgba(240, 240, 240, 0.8)
    font_size = 30
    font_family = $font
    position = 0, 300
    halign = center
    valign = center
}
