# prefixキーを変更する
set -g prefix C-j

# デフォルトのprefixキーC-bを解除する
unbind C-b

## reload the config
unbind r
bind r source-file "${HOME}/.config/tmux/tmux.conf" \; display "Reloaded tmux conf"

# == ペイン操作簡略化
# ペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ
bind -r Left resize-pane -L 1
bind -r Down resize-pane -D 1
bind -r Up resize-pane -U 1
bind -r Right resize-pane -R 1

# ペイン位置入れ替え
bind -r C-Left swapp -s '{right-of}'
bind -r C-Down swapp -s '{down-of}'
bind -r C-Up swapp -s '{up-of}'
bind -r C-Right swapp -s '{right-of}'

# ペイン分割
bind V split-window -h -c "#{pane_current_path}"
bind H split-window -v -c "#{pane_current_path}"

# ウィンドウ移動
#bind C-j select-pane -t :.+
bind -r C-w next-window

# ペインを指定ウィンドウに移動
# bind @ command-prompt -p "join pane from window:" "join-pane -s '%%'"

