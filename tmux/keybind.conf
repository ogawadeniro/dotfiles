# prefixキーを変更する
set -g prefix C-j

# デフォルトのprefixキーC-bを解除する
unbind C-b

## 設定を再読み込み
unbind r
bind r source-file "${HOME}/.config/tmux/tmux.conf" \; display "Reloaded tmux conf"

# == ペイン操作簡略化
# ペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ
bind -r Left resize-pane -L 1
bind -r Down resize-pane -D 1
bind -r Up resize-pane -U 1
bind -r Right resize-pane -R 1

# ペイン配置変更
bind -r H swapp -s '{right-of}'
bind -r J swapp -s '{down-of}'
bind -r K swapp -s '{up-of}'
bind -r L swapp -s '{right-of}'

# ペインプリセット呼び出し
bind-key p switch-client -T pane-preset
bind -T pane-preset e select-layout tiled
bind -T pane-preset h select-layout main-vertical
bind -T pane-preset j select-layout main-horizontal-mirrored
bind -T pane-preset k select-layout main-horizontal
bind -T pane-preset l select-layout main-vertical-mirrored

# ペイン分割
bind V split-window -h -c "#{pane_current_path}"
bind S split-window -v -c "#{pane_current_path}"


# ウィンドウ移動
#bind C-j select-pane -t :.+
bind -r C-w next-window

# コピーモード
# yでコピーモードに入る
bind y copy-mode
# 'v' で選択開始
bind-key -T copy-mode-vi v send-keys -X begin-selection
# 選択中のテキストをコピーしてコピーモードを抜ける
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ペインを指定ウィンドウに移動
bind m command-prompt -p "Move pane to window(virtical):" "move-pane -h -t ':%%'"
bind M command-prompt -p "Move pane to window(horizontal):" "move-pane -v -t ':%%'"

# レイアウト切り替え（next-layout）
bind R select-layout -n

